name: "Deploy Backend to Firebase Functions"

on:
  push:
    branches:
      - main
    paths:
      - 'functions/**'
      - 'firebase.json'
      - 'firestore.rules'
      - '.github/workflows/backend-deploy.yaml'
  workflow_dispatch: # Permite execução manual
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'production'
        type: choice
        options:
        - production
        - staging

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: functions/package-lock.json
        
    - name: Install dependencies
      working-directory: ./functions
      run: npm ci
      
    - name: Run TypeScript compilation check
      working-directory: ./functions
      run: npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: functions/package-lock.json
        
    - name: Install Firebase CLI
      run: npm install -g firebase-tools
      
    - name: Install functions dependencies
      working-directory: ./functions
      run: npm ci
      
    - name: Build functions
      working-directory: ./functions
      run: npm run build
      
    - name: Authenticate with Firebase
      run: |
        echo '${{ secrets.FIREBASE_DEV }}' > /tmp/firebase-key.json
        export GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-key.json
        firebase use ${{ secrets.FIREBASE_PROJECT_ID }}
      
    - name: Deploy Functions
      run: |
        export GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-key.json
        firebase deploy --only functions --project ${{ secrets.FIREBASE_PROJECT_ID }} --force
      
    - name: Clean up credentials
      if: always()
      run: rm -f /tmp/firebase-key.json
      
    - name: Notify deployment success
      if: success()
      run: |
        echo "✅ Backend deployed successfully!"
        echo "🔗 Functions URL: https://us-central1-${{ secrets.FIREBASE_PROJECT_ID }}.cloudfunctions.net"
        
    - name: Notify deployment failure
      if: failure()
      run: |
        echo "❌ Backend deployment failed!"
        echo "Check the logs above for details."